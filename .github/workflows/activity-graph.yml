name: Generate Activity Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Activity Graph
        uses: Ashutosh00710/github-readme-activity-graph@main
        with:
          github-username: rahhhmann
          theme: github-dark
          output-file: activity-graph.svg

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add activity-graph.svg
          git commit -m "update activity-graph" || exit 0
          git push origin HEAD:activity-graph-output 2>/dev/null || git push -u origin HEAD:activity-graph-output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

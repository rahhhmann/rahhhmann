name: Generate Activity Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Activity Graph
        run: |
          curl -o activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=rahhhmann&theme=github-dark&bg_color=000000&color=FFFFFF&line=6E40C9&point=FFFFFF&area=true&hide_border=false"

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add activity-graph.svg
          git commit -m "update activity-graph" || exit 0
          git push origin HEAD:activity-graph-output 2>/dev/null || git push -u origin HEAD:activity-graph-output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
